name: PR Welcome

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  pull-requests: write

jobs:
  comment:
    name: Post CI instructions
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = [
              '👋 Thanks for contributing to InfiniLM!',
              '',
              'CI runs automatically when this pull request is opened, reopened, or marked ready for review.',
              '',
              'After pushing new commits, a maintainer can re-run CI by commenting:',
              '',
              '```',
              '/retest',
              '```',
              '',
              '| Command | Description |',
              '| --- | --- |',
              '| `/retest` | Re-run CI for the current commit |',
              '| `/test` | Same as `/retest` |',
              '',
              '🚀',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
