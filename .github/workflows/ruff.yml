name: Ruff

on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chartboost/ruff-action@v1
        with:
          src: "./scripts/format.py"
          version: "0.15.20"
      - uses: chartboost/ruff-action@v1
        with:
          src: "./scripts/format.py"
          args: format --check
          version: "0.15.20"
